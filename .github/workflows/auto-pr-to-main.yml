name: Auto PR — develop → main

on:
  push:
    branches:
      - develop

jobs:
  create-pr:
    name: Create PR to main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create PR from develop to main (if not exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing_pr=$(gh pr list \
            --base main \
            --head develop \
            --state open \
            --json number \
            --jq '.[0].number' \
            2>/dev/null)

          if [ -z "$existing_pr" ]; then
            gh pr create \
              --base main \
              --head develop \
              --title "chore: promote develop → main" \
              --body "$(cat <<'EOF'
## Promoção automática: develop → main

Este PR foi criado automaticamente após um merge na branch **develop**.

---

## Checklist

### CI
- [ ] Todos os checks de CI estão passando neste PR
EOF
)"
            echo "PR criado com sucesso."
          else
            echo "PR #$existing_pr já existe. Nenhuma ação necessária."
          fi
